name: Linux Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: 🚧 Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: 📦 Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🚧 Build Release
        run: cargo build --release --all-features --target x86_64-unknown-linux-gnu

      - name: 📦 Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/sqwale dist/
          cp LICENSE README.md dist/
          cd dist
          tar czf ../sqwale-linux-x64.tar.gz *

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: sqwale-linux-x64
          path: sqwale-linux-x64.tar.gz
          if-no-files-found: error
          retention-days: 7
