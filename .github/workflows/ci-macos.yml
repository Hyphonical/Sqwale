name: macOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    name: 🚧 macOS ARM64 (Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: 📦 Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🚧 Build Release
        run: cargo build --release --all-features --target aarch64-apple-darwin

      - name: 📦 Package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/sqwale dist/
          cp LICENSE README.md dist/
          cd dist
          tar czf ../sqwale-macos-arm64.tar.gz *

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: sqwale-macos-arm64
          path: sqwale-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 7
